
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <defs>
        <linearGradient id="bgcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
        </linearGradient>
      </defs>
      
      {/* Fondo con bordes redondeados estilo app de Windows */}
      <rect width="100" height="100" rx="22" fill="url(#bgcGrad)" />
      
      {/* Rombo (Guía geométrica) - Ahora más grande (de 15 a 85 en Y) */}
      <path d="M50 15 L82 35 V65 L50 85 L18 65 V35 Z" fill="none" stroke="white" stroke-width="1.8" stroke-dasharray="3 2" opacity="0.5"/>
      
      {/* Texto BGC - Aumentado de tamaño 22 a 28 */}
      <text x="50" y="60" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-weight="bold" font-size="28" style="filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.2))">BGC</text>
      
      {/* Círculos con colores específicos - Mantienen tamaño 4.5 r */}
      <circle cx="50" cy="15" r="4.5" fill="#10b981" stroke="white" stroke-width="1.5" /> {/* Superior: Esmeralda */}
      <circle cx="82" cy="65" r="4.5" fill="#000000" stroke="white" stroke-width="1.5" /> {/* Inferior Derecho: Negro */}
      <circle cx="18" cy="65" r="4.5" fill="#3b82f6" stroke="white" stroke-width="1.5" /> {/* Inferior Izquierdo: Azul */}
    </svg>
  