name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate app icon
        run: python build.py

      - name: Build EXE
        run: >-
          pyinstaller
          --noconfirm
          --onefile
          --windowed
          --add-data "assets;assets"
          --add-data "styles;styles"
          --icon "app_icon2.ico"
          --name "BGC-software"
          app.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: BGC-software-windows
          path: dist/BGC-software.exe
          retention-days: 30
